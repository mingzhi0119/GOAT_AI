scrape_configs:
  - job_name: goat-ai-api
    metrics_path: /api/system/metrics
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:62606
    http_headers:
      X-GOAT-API-Key:
        values:
          - replace-with-read-or-metrics-scope-key
    scrape_interval: 15s
    scrape_timeout: 10s
