format: llm-compact-api
source:
  canonical_openapi: docs/api/openapi.json
  openapi_version: 3.2.0
  generated_from: backend.main:app
  purpose: Minimal API context for LLM consumption
api:
  name: GOAT AI
  base_path: /api
  auth:
    scheme: api_key_optional
    header: X-GOAT-API-Key
    applies_to: all_except_health
  common_headers:
    response:
      X-Request-ID: request trace id
      Retry-After: present on 429
  common_errors:
    400:
      detail: bad request
    401:
      detail: invalid or missing api key
    404:
      detail: not found
    422:
      detail: validation error
    429:
      detail: too many requests
    503:
      detail: ai backend unavailable
schemas:
  ChatArtifact:
    type: object
    required:
      - artifact_id
      - filename
      - mime_type
      - byte_size
      - download_url
    properties:
      artifact_id: string
      filename: string
      mime_type: string
      byte_size: integer
      download_url: string
      label: string|null
      source_message_id: string|null
  ChatMessage:
    type: object
    required:
      - role
      - content
    properties:
      role: string
      content: string
      file_context: boolean
      image_attachment_ids: string[]
  ChatRequest:
    type: object
    required:
      - messages
    properties:
      model: string
      messages: ChatMessage[]
      knowledge_document_ids: string[]
      image_attachment_ids: string[]
      session_id: string|null
      system_instruction: string|null
      temperature: number|null
      max_tokens: integer|null
      top_p: number|null
      think: boolean|low|medium|high|null
      plan_mode: boolean
      theme_style: classic|urochester|thu
  CodeSandboxExecRequest:
    type: object
    properties:
      execution_mode: sync|async
      runtime_preset: string
      code: string|null
      command: string|null
      stdin: string|null
      timeout_sec: integer|null
      network_policy: disabled|allowlist|enabled|null
      files: CodeSandboxInlineFile[]
  CodeSandboxExecutionEventPayload:
    type: object
    required:
      - sequence
      - event_type
      - created_at
    properties:
      sequence: integer
      event_type: string
      created_at: string
      status: queued|running|completed|failed|denied|cancelled|null
      message: string|null
      metadata: object
  CodeSandboxExecutionEventsResponse:
    type: object
    required:
      - execution_id
      - events
    properties:
      execution_id: string
      events: CodeSandboxExecutionEventPayload[]
  CodeSandboxExecutionResponse:
    type: object
    required:
      - execution_id
      - status
      - execution_mode
      - runtime_preset
      - network_policy
      - created_at
      - updated_at
    properties:
      execution_id: string
      status: queued|running|completed|failed|denied|cancelled
      execution_mode: sync|async
      runtime_preset: string
      network_policy: disabled|allowlist|enabled
      created_at: string
      updated_at: string
      started_at: string|null
      finished_at: string|null
      provider_name: string
      isolation_level: container|host
      network_policy_enforced: boolean
      exit_code: integer|null
      stdout: string
      stderr: string
      timed_out: boolean
      error_detail: string|null
      output_files: CodeSandboxOutputFilePayload[]
  CodeSandboxFeaturePayload:
    type: object
    required:
      - policy_allowed
      - allowed_by_config
      - available_on_host
      - effective_enabled
      - provider_name
      - isolation_level
      - network_policy_enforced
    properties:
      policy_allowed: boolean
      allowed_by_config: boolean
      available_on_host: boolean
      effective_enabled: boolean
      provider_name: string
      isolation_level: string
      network_policy_enforced: boolean
      deny_reason: string|null
  CodeSandboxInlineFile:
    type: object
    required:
      - filename
      - content
    properties:
      filename: string
      content: string
  CodeSandboxOutputFilePayload:
    type: object
    required:
      - path
      - byte_size
    properties:
      path: string
      byte_size: integer
  ErrorResponse:
    type: object
    required:
      - detail
      - code
    properties:
      detail: string|any[]|object
      code: string
      request_id: string|null
  GPUStatusResponse:
    type: object
    required:
      - available
      - active
      - message
    properties:
      available: boolean
      active: boolean
      message: string
      name: string
      uuid: string
      utilization_gpu: number|null
      memory_used_mb: number|null
      memory_total_mb: number|null
      temperature_c: number|null
      power_draw_w: number|null
  HistorySessionDetailResponse:
    type: object
    required:
      - id
      - title
      - model
      - schema_version
      - created_at
      - updated_at
      - messages
    properties:
      id: string
      title: string
      model: string
      schema_version: integer
      created_at: string
      updated_at: string
      owner_id: string
      messages: HistorySessionMessage[]
      chart_spec: object|null
      file_context: HistorySessionFileContext|null
      knowledge_documents: HistorySessionKnowledgeDocument[]
      workspace_outputs: WorkbenchWorkspaceOutputPayload[]
      chart_data_source: string|null
  HistorySessionFileContext:
    type: object
    required:
      - prompt
    properties:
      prompt: string
  HistorySessionKnowledgeDocument:
    type: object
    required:
      - document_id
      - filename
      - mime_type
    properties:
      document_id: string
      filename: string
      mime_type: string
  HistorySessionListResponse:
    type: object
    required:
      - sessions
    properties:
      sessions: HistorySessionSummary[]
  HistorySessionMessage:
    type: object
    required:
      - role
      - content
    properties:
      role: string
      content: string
      image_attachment_ids: string[]
      artifacts: ChatArtifact[]
  HistorySessionRenameRequest:
    type: object
    required:
      - title
    properties:
      title: string
  HistorySessionSummary:
    type: object
    required:
      - id
      - title
      - model
      - schema_version
      - created_at
      - updated_at
    properties:
      id: string
      title: string
      model: string
      schema_version: integer
      created_at: string
      updated_at: string
      owner_id: string
  InferenceLatencyResponse:
    type: object
    required:
      - chat_avg_ms
      - chat_sample_count
      - chat_p50_ms
      - chat_p95_ms
      - first_token_avg_ms
      - first_token_sample_count
      - first_token_p50_ms
      - first_token_p95_ms
      - model_buckets
    properties:
      chat_avg_ms: number
      chat_sample_count: integer
      chat_p50_ms: number
      chat_p95_ms: number
      first_token_avg_ms: number
      first_token_sample_count: integer
      first_token_p50_ms: number
      first_token_p95_ms: number
      model_buckets: map[string,map[string,number|integer]]
  KnowledgeAnswerRequest:
    type: object
    required:
      - query
    properties:
      query: string
      document_ids: string[]
      top_k: integer
      session_id: string|null
  KnowledgeAnswerResponse:
    type: object
    required:
      - answer
    properties:
      answer: string
      citations: KnowledgeCitation[]
  KnowledgeCitation:
    type: object
    required:
      - document_id
      - chunk_id
      - filename
      - snippet
      - score
    properties:
      document_id: string
      chunk_id: string
      filename: string
      snippet: string
      score: number
  KnowledgeIngestionRequest:
    type: object
    required:
      - document_id
    properties:
      document_id: string
      parser_profile: string
      chunking_profile: string
      embedding_profile: string
      force_reindex: boolean
  KnowledgeIngestionResponse:
    type: object
    required:
      - ingestion_id
      - document_id
      - status
    properties:
      ingestion_id: string
      document_id: string
      status: queued|running|completed|failed
  KnowledgeIngestionStatusResponse:
    type: object
    required:
      - ingestion_id
      - document_id
      - status
    properties:
      ingestion_id: string
      document_id: string
      status: queued|running|completed|failed
      chunk_count: integer
      error_code: string|null
      error_detail: string|null
  KnowledgeSearchRequest:
    type: object
    required:
      - query
    properties:
      query: string
      document_ids: string[]
      top_k: integer
      retrieval_profile: string
  KnowledgeSearchResponse:
    type: object
    required:
      - query
    properties:
      query: string
      hits: KnowledgeCitation[]
      effective_query: string|null
  KnowledgeUploadResponse:
    type: object
    required:
      - upload_id
      - document_id
      - status
      - filename
      - mime_type
      - byte_size
    properties:
      upload_id: string
      document_id: string
      status: string
      filename: string
      mime_type: string
      byte_size: integer
  KnowledgeUploadStatusResponse:
    type: object
    required:
      - upload_id
      - document_id
      - status
      - filename
      - mime_type
      - byte_size
    properties:
      upload_id: string
      document_id: string
      status: uploaded|indexed|failed
      filename: string
      mime_type: string
      byte_size: integer
  MediaUploadResponse:
    type: object
    required:
      - attachment_id
      - filename
      - mime_type
      - byte_size
    properties:
      attachment_id: string
      filename: string
      mime_type: string
      byte_size: integer
      width_px: integer|null
      height_px: integer|null
  ModelCapabilitiesResponse:
    type: object
    required:
      - model
      - capabilities
      - supports_tool_calling
      - supports_chart_tools
      - supports_vision
      - supports_thinking
    properties:
      model: string
      capabilities: string[]
      supports_tool_calling: boolean
      supports_chart_tools: boolean
      supports_vision: boolean
      supports_thinking: boolean
      context_length: integer|null
  ModelsResponse:
    type: object
    required:
      - models
    properties:
      models: string[]
  RuntimeFeaturePayload:
    type: object
    required:
      - allowed_by_config
      - available_on_host
      - effective_enabled
    properties:
      allowed_by_config: boolean
      available_on_host: boolean
      effective_enabled: boolean
      deny_reason: string|null
  RuntimeOperationalContractResponse:
    type: object
    required:
      - storage_model
      - concurrency_model
      - process_local_seams
      - scaling_notes
    properties:
      storage_model: string
      concurrency_model: string
      process_local_seams: string[]
      scaling_notes: string[]
  RuntimeTargetItemResponse:
    type: object
    required:
      - mode
      - host
      - port
      - base_url
      - reason
    properties:
      mode: string
      host: string
      port: integer
      base_url: string
      reason: string
  RuntimeTargetResponse:
    type: object
    required:
      - deploy_target
      - current
      - ordered_targets
      - operational_contract
    properties:
      deploy_target: string
      current: RuntimeTargetItemResponse
      ordered_targets: RuntimeTargetItemResponse[]
      operational_contract: RuntimeOperationalContractResponse
  SystemFeaturesResponse:
    type: object
    required:
      - code_sandbox
      - workbench
    properties:
      code_sandbox: CodeSandboxFeaturePayload
      workbench: WorkbenchFeaturePayload
  UploadAnalysisResponse:
    type: object
    required:
      - filename
      - suffix_prompt
      - document_id
      - ingestion_id
      - status
      - retrieval_mode
      - template_prompt
    properties:
      filename: string
      suffix_prompt: string
      document_id: string
      ingestion_id: string
      status: string
      retrieval_mode: string
      template_prompt: string
      chart: "null"
  WorkbenchFeaturePayload:
    type: object
    required:
      - agent_tasks
      - plan_mode
      - browse
      - deep_research
      - artifact_workspace
      - project_memory
      - connectors
    properties:
      agent_tasks: RuntimeFeaturePayload
      plan_mode: RuntimeFeaturePayload
      browse: RuntimeFeaturePayload
      deep_research: RuntimeFeaturePayload
      artifact_workspace: RuntimeFeaturePayload
      project_memory: RuntimeFeaturePayload
      connectors: RuntimeFeaturePayload
  WorkbenchSourcePayload:
    type: object
    required:
      - source_id
      - display_name
      - kind
      - scope_kind
      - runtime_ready
      - description
    properties:
      source_id: string
      display_name: string
      kind: builtin|knowledge|connector
      scope_kind: global|knowledge_documents|connector_binding
      capabilities: string[]
      task_kinds: plan|browse|deep_research|canvas[]
      read_only: boolean
      runtime_ready: boolean
      deny_reason: string|null
      description: string
  WorkbenchSourcesResponse:
    type: object
    properties:
      sources: WorkbenchSourcePayload[]
  WorkbenchTaskAcceptedResponse:
    type: object
    required:
      - task_id
      - task_kind
      - status
      - created_at
    properties:
      task_id: string
      task_kind: plan|browse|deep_research|canvas
      status: queued|running|completed|failed
      created_at: string
  WorkbenchTaskEventPayload:
    type: object
    required:
      - sequence
      - event_type
      - created_at
    properties:
      sequence: integer
      event_type: task.queued|task.started|retrieval.sources_resolved|retrieval.step.completed|retrieval.step.skipped|workspace_output.created|workspace_output.exported|task.completed|task.failed
      created_at: string
      status: queued|running|completed|failed|null
      message: string|null
      metadata: object
  WorkbenchTaskEventsResponse:
    type: object
    required:
      - task_id
    properties:
      task_id: string
      events: WorkbenchTaskEventPayload[]
  WorkbenchTaskRequest:
    type: object
    required:
      - task_kind
      - prompt
    properties:
      task_kind: plan|browse|deep_research|canvas
      prompt: string
      session_id: string|null
      project_id: string|null
      knowledge_document_ids: string[]
      source_ids: string[]
      connector_ids: string[]
  WorkbenchTaskResultPayload:
    type: object
    required:
      - content
    properties:
      format: string
      content: string
      citations: KnowledgeCitation[]
  WorkbenchTaskStatusResponse:
    type: object
    required:
      - task_id
      - task_kind
      - status
      - created_at
      - updated_at
    properties:
      task_id: string
      task_kind: plan|browse|deep_research|canvas
      status: queued|running|completed|failed
      created_at: string
      updated_at: string
      error_detail: string|null
      result: WorkbenchTaskResultPayload|null
      workspace_outputs: WorkbenchWorkspaceOutputPayload[]
  WorkbenchWorkspaceOutputExportRequest:
    type: object
    required:
      - format
    properties:
      format: markdown|text|csv|xlsx|docx
      filename: string|null
  WorkbenchWorkspaceOutputPayload:
    type: object
    required:
      - output_id
      - output_kind
      - title
      - content_format
      - content
      - created_at
      - updated_at
    properties:
      output_id: string
      output_kind: string
      title: string
      content_format: string
      content: string
      created_at: string
      updated_at: string
      metadata: object
      artifacts: ChatArtifact[]
  WorkbenchWorkspaceOutputsResponse:
    type: object
    properties:
      outputs: WorkbenchWorkspaceOutputPayload[]
endpoints:
  - op: list_models_route
    method: GET
    path: /models
    response:
      200: ModelsResponse
      errors:
        - 401
        - 429
        - 503
  - op: get_model_capabilities_route
    method: GET
    path: /models/capabilities
    response:
      200: ModelCapabilitiesResponse
      errors:
        - 401
        - 422
        - 429
        - 503
  - op: chat_stream
    method: POST
    path: /chat
    body: ChatRequest
    content_type: application/json
    response:
      200:
        content_type: text/event-stream
        stream:
          - token:
              type: token
              token: string
          - chart_spec: ChartSpec
          - artifact:
              type: artifact
              artifact_id: string
              filename: string
              mime_type: string
              byte_size: integer
              download_url: string
              source_message_id: string|null
          - done:
              type: done
          - error_frame:
              type: error
              message: string
      errors:
        - 401
        - 422
        - 429
  - op: upload_and_parse
    method: POST
    path: /upload
    body:
      content_type: multipart/form-data
      fields:
        file: binary
      schema: Body_upload_and_parse_api_upload_post
    response:
      200:
        content_type: text/event-stream
        stream:
          - file_prompt:
              type: file_prompt
              filename: string
              suffix_prompt: string
          - knowledge_ready:
              type: knowledge_ready
              filename: string
              suffix_prompt: string
              document_id: string
              ingestion_id: string
              status: string
              retrieval_mode: string
              template_prompt: string
          - done:
              type: done
          - error_frame:
              type: error
              message: string
      errors:
        - 400
        - 401
        - 422
        - 429
  - op: analyze_upload_json_route
    method: POST
    path: /upload/analyze
    body:
      content_type: multipart/form-data
      fields:
        file: binary
      schema: Body_analyze_upload_json_route_api_upload_analyze_post
    response:
      200: UploadAnalysisResponse
      errors:
        - 400
        - 401
        - 422
        - 429
  - op: list_history
    method: GET
    path: /history
    response:
      200: HistorySessionListResponse
      errors:
        - 401
        - 403
        - 429
        - 500
  - op: delete_all_history
    method: DELETE
    path: /history
    response:
      204: no_content
      errors:
        - 401
        - 403
        - 429
        - 500
  - op: rename_history_session_route
    method: PATCH
    path: /history/{session_id}
    path_params:
      session_id: string
    body: HistorySessionRenameRequest
    content_type: application/json
    response:
      204: no_content
      errors:
        - 401
        - 403
        - 404
        - 422
        - 429
        - 500
  - op: get_history_session
    method: GET
    path: /history/{session_id}
    path_params:
      session_id: string
    response:
      200: HistorySessionDetailResponse
      errors:
        - 401
        - 403
        - 404
        - 422
        - 429
        - 500
  - op: delete_history_session
    method: DELETE
    path: /history/{session_id}
    path_params:
      session_id: string
    response:
      204: no_content
      errors:
        - 401
        - 403
        - 404
        - 422
        - 429
        - 500
  - op: post_knowledge_upload
    method: POST
    path: /knowledge/uploads
    body:
      content_type: multipart/form-data
      fields:
        file: binary
      schema: Body_post_knowledge_upload_api_knowledge_uploads_post
    response:
      200: KnowledgeUploadResponse
      errors:
        - 400
        - 401
        - 422
        - 429
  - op: get_knowledge_upload_status
    method: GET
    path: /knowledge/uploads/{document_id}
    path_params:
      document_id: string
    response:
      200: KnowledgeUploadStatusResponse
      errors:
        - 401
        - 404
        - 422
        - 429
  - op: post_knowledge_ingestion
    method: POST
    path: /knowledge/ingestions
    body: KnowledgeIngestionRequest
    content_type: application/json
    response:
      200: KnowledgeIngestionResponse
      errors:
        - 400
        - 401
        - 404
        - 422
        - 429
  - op: get_knowledge_ingestion
    method: GET
    path: /knowledge/ingestions/{ingestion_id}
    path_params:
      ingestion_id: string
    response:
      200: KnowledgeIngestionStatusResponse
      errors:
        - 401
        - 404
        - 422
        - 429
  - op: post_knowledge_search
    method: POST
    path: /knowledge/search
    body: KnowledgeSearchRequest
    content_type: application/json
    response:
      200: KnowledgeSearchResponse
      errors:
        - 401
        - 422
        - 429
  - op: post_knowledge_answer
    method: POST
    path: /knowledge/answers
    body: KnowledgeAnswerRequest
    content_type: application/json
    response:
      200: KnowledgeAnswerResponse
      errors:
        - 401
        - 422
        - 429
  - op: post_media_upload
    method: POST
    path: /media/uploads
    body:
      content_type: multipart/form-data
      fields:
        file: binary
      schema: Body_post_media_upload_api_media_uploads_post
    response:
      200: MediaUploadResponse
      errors:
        - 400
        - 401
        - 404
        - 422
        - 429
  - op: get_artifact_download
    method: GET
    path: /artifacts/{artifact_id}
    path_params:
      artifact_id: string
    response:
      200: object
      errors:
        - 401
        - 404
        - 422
        - 429
  - op: get_gpu_status
    method: GET
    path: /system/gpu
    response:
      200: GPUStatusResponse
      errors:
        - 401
        - 429
  - op: get_inference_latency_route
    method: GET
    path: /system/inference
    response:
      200: InferenceLatencyResponse
      errors:
        - 401
        - 429
  - op: get_system_features_route
    method: GET
    path: /system/features
    response:
      200: SystemFeaturesResponse
      errors:
        - 401
        - 429
  - op: get_runtime_target_route
    method: GET
    path: /system/runtime-target
    response:
      200: RuntimeTargetResponse
      errors:
        - 401
        - 429
  - op: get_ready_route
    method: GET
    path: /ready
    response:
      200: object
      errors:
        - 503
  - op: get_system_metrics_route
    method: GET
    path: /system/metrics
    response:
      errors:
        - 401
        - 429
  - op: post_code_sandbox_exec
    method: POST
    path: /code-sandbox/exec
    body: CodeSandboxExecRequest
    content_type: application/json
    response:
      200: CodeSandboxExecutionResponse
      202: CodeSandboxExecutionResponse
      errors:
        - 401
        - 403
        - 422
        - 429
        - 503
  - op: get_code_sandbox_execution_route
    method: GET
    path: /code-sandbox/executions/{execution_id}
    path_params:
      execution_id: string
    response:
      200: CodeSandboxExecutionResponse
      errors:
        - 401
        - 403
        - 404
        - 422
        - 429
        - 503
  - op: post_code_sandbox_execution_cancel_route
    method: POST
    path: /code-sandbox/executions/{execution_id}/cancel
    path_params:
      execution_id: string
    response:
      200: CodeSandboxExecutionResponse
      errors:
        - 401
        - 403
        - 404
        - 409
        - 422
        - 429
        - 503
  - op: post_code_sandbox_execution_retry_route
    method: POST
    path: /code-sandbox/executions/{execution_id}/retry
    path_params:
      execution_id: string
    response:
      200: CodeSandboxExecutionResponse
      errors:
        - 401
        - 403
        - 404
        - 409
        - 422
        - 429
        - 503
  - op: get_code_sandbox_execution_events_route
    method: GET
    path: /code-sandbox/executions/{execution_id}/events
    path_params:
      execution_id: string
    response:
      200: CodeSandboxExecutionEventsResponse
      errors:
        - 401
        - 403
        - 404
        - 422
        - 429
        - 503
  - op: get_code_sandbox_execution_logs_route
    method: GET
    path: /code-sandbox/executions/{execution_id}/logs
    path_params:
      execution_id: string
    response:
      200:
        content_type: text/event-stream
        stream:
          - status:
              type: status
              execution_id: string
              status: queued|running|completed|failed|denied
              provider_name: string
              updated_at: string
              timed_out: boolean
          - stdout:
              type: stdout
              execution_id: string
              sequence: integer
              created_at: string
              chunk: string
          - stderr:
              type: stderr
              execution_id: string
              sequence: integer
              created_at: string
              chunk: string
          - done:
              type: done
          - error_frame:
              type: error
              message: string
      errors:
        - 401
        - 403
        - 404
        - 422
        - 429
        - 503
  - op: post_workbench_task
    method: POST
    path: /workbench/tasks
    body: WorkbenchTaskRequest
    content_type: application/json
    response:
      202: WorkbenchTaskAcceptedResponse
      errors:
        - 401
