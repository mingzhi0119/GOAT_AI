<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GOAT AI — Strategic Intelligence by Simon Business School" />
    <title>GOAT AI — Simon Business School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      ;(() => {
        const storageKey = 'goat-ai-appearance'
        const legacyKey = 'goat-ai-theme'
        const defaults = {
          themeMode: 'system',
          themeStyle: 'classic',
          accentColor: '#339cff',
          uiFont: 'inter',
          codeFont: 'jetbrains',
          contrast: 45,
          translucentSidebar: true,
        }

        const themeTokens = {
          classic: {
            light: {
              mainBg: '#f3f5f8',
              sidebarBg: '#eef2f6',
              chatBg: '#f8fafc',
              textMain: '#16181d',
              textMuted: '#6f7683',
              textSidebar: '#1d2128',
              panelBg: 'rgba(255, 255, 255, 0.88)',
              panelBgStrong: 'rgba(255, 255, 255, 0.97)',
              borderColor: 'rgba(18, 24, 38, 0.08)',
              inputBg: 'rgba(255, 255, 255, 0.94)',
              inputBorder: 'rgba(18, 24, 38, 0.08)',
              sidebarHover: 'rgba(18, 24, 38, 0.045)',
              sidebarSurface: 'rgba(255, 255, 255, 0.86)',
              sidebarSurfaceMuted: 'rgba(255, 255, 255, 0.72)',
              sidebarMuted: '#6b7280',
              scrollbarThumb: '#cfd6df',
            },
            dark: {
              mainBg: '#0d1016',
              sidebarBg: '#0a0d12',
              chatBg: '#11151c',
              textMain: '#f6f7fb',
              textMuted: '#a0a8b7',
              textSidebar: '#edf1f7',
              panelBg: 'rgba(17, 21, 28, 0.84)',
              panelBgStrong: 'rgba(17, 21, 28, 0.96)',
              borderColor: 'rgba(255, 255, 255, 0.09)',
              inputBg: 'rgba(20, 24, 33, 0.94)',
              inputBorder: 'rgba(255, 255, 255, 0.09)',
              sidebarHover: 'rgba(255, 255, 255, 0.055)',
              sidebarSurface: 'rgba(255, 255, 255, 0.08)',
              sidebarSurfaceMuted: 'rgba(255, 255, 255, 0.06)',
              sidebarMuted: 'rgba(255, 255, 255, 0.56)',
              scrollbarThumb: '#3b4453',
            },
          },
          urochester: {
            light: {
              mainBg: '#f7f5f0',
              sidebarBg: '#f0ebe2',
              chatBg: '#faf7f1',
              textMain: '#1d1b18',
              textMuted: '#73695d',
              textSidebar: '#221f1a',
              panelBg: 'rgba(255, 251, 243, 0.88)',
              panelBgStrong: 'rgba(255, 251, 243, 0.97)',
              borderColor: 'rgba(51, 41, 28, 0.10)',
              inputBg: 'rgba(255, 252, 247, 0.94)',
              inputBorder: 'rgba(51, 41, 28, 0.10)',
              sidebarHover: 'rgba(61, 44, 20, 0.06)',
              sidebarSurface: 'rgba(255, 251, 243, 0.84)',
              sidebarSurfaceMuted: 'rgba(255, 251, 243, 0.72)',
              sidebarMuted: '#776b58',
              scrollbarThumb: '#d8cbbb',
            },
            dark: {
              mainBg: '#131111',
              sidebarBg: '#16110d',
              chatBg: '#1a1512',
              textMain: '#f6f0e9',
              textMuted: '#c4b7a7',
              textSidebar: '#fff5e9',
              panelBg: 'rgba(33, 25, 21, 0.84)',
              panelBgStrong: 'rgba(33, 25, 21, 0.96)',
              borderColor: 'rgba(255, 232, 208, 0.11)',
              inputBg: 'rgba(31, 24, 20, 0.94)',
              inputBorder: 'rgba(255, 232, 208, 0.11)',
              sidebarHover: 'rgba(255, 237, 218, 0.07)',
              sidebarSurface: 'rgba(255, 246, 235, 0.09)',
              sidebarSurfaceMuted: 'rgba(255, 246, 235, 0.07)',
              sidebarMuted: 'rgba(255, 245, 233, 0.58)',
              scrollbarThumb: '#584639',
            },
          },
          thu: {
            light: {
              mainBg: '#f4f6f5',
              sidebarBg: '#e9edeb',
              chatBg: '#f7faf8',
              textMain: '#16211d',
              textMuted: '#64736d',
              textSidebar: '#17211d',
              panelBg: 'rgba(250, 253, 251, 0.88)',
              panelBgStrong: 'rgba(250, 253, 251, 0.97)',
              borderColor: 'rgba(21, 43, 35, 0.09)',
              inputBg: 'rgba(255, 255, 255, 0.95)',
              inputBorder: 'rgba(21, 43, 35, 0.09)',
              sidebarHover: 'rgba(21, 43, 35, 0.05)',
              sidebarSurface: 'rgba(255, 255, 255, 0.84)',
              sidebarSurfaceMuted: 'rgba(255, 255, 255, 0.72)',
              sidebarMuted: '#63706b',
              scrollbarThumb: '#c5d2cc',
            },
            dark: {
              mainBg: '#081411',
              sidebarBg: '#09100d',
              chatBg: '#0d1915',
              textMain: '#edf8f3',
              textMuted: '#9eb6ad',
              textSidebar: '#eef8f4',
              panelBg: 'rgba(13, 25, 21, 0.84)',
              panelBgStrong: 'rgba(13, 25, 21, 0.96)',
              borderColor: 'rgba(227, 247, 238, 0.09)',
              inputBg: 'rgba(16, 31, 26, 0.94)',
              inputBorder: 'rgba(227, 247, 238, 0.09)',
              sidebarHover: 'rgba(227, 247, 238, 0.055)',
              sidebarSurface: 'rgba(227, 247, 238, 0.08)',
              sidebarSurfaceMuted: 'rgba(227, 247, 238, 0.06)',
              sidebarMuted: 'rgba(227, 247, 238, 0.56)',
              scrollbarThumb: '#36524a',
            },
          },
        }

        const uiFonts = {
          inter:
            '"Inter", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", "Segoe UI", system-ui, sans-serif',
          'system-sans':
            'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif',
          humanist:
            '"Segoe UI", "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei UI", sans-serif',
        }

        const codeFonts = {
          jetbrains: '"JetBrains Mono", "Fira Code", Consolas, monospace',
          sfmono: 'ui-monospace, "SFMono-Regular", "SF Mono", Consolas, monospace',
          mono: 'ui-monospace, "Cascadia Mono", "Liberation Mono", monospace',
        }

        const isHex = value => typeof value === 'string' && /^#[0-9a-f]{6}$/i.test(value)
        const clamp = value => Math.max(0, Math.min(100, Math.round(Number(value) || defaults.contrast)))
        const parseRgb = hex => [
          parseInt(hex.slice(1, 3), 16),
          parseInt(hex.slice(3, 5), 16),
          parseInt(hex.slice(5, 7), 16),
        ]
        const rgba = (rgb, alpha) => `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`
        const accentForeground = hex => {
          const [r, g, b] = parseRgb(hex)
          const brightness = (r * 299 + g * 587 + b * 114) / 1000
          return brightness > 150 ? '#111827' : '#ffffff'
        }

        let config = defaults
        try {
          const raw = localStorage.getItem(storageKey)
          if (raw) {
            const parsed = JSON.parse(raw)
            config = {
              themeMode: ['light', 'dark', 'system'].includes(parsed.themeMode) ? parsed.themeMode : defaults.themeMode,
              themeStyle: ['classic', 'urochester', 'thu'].includes(parsed.themeStyle) ? parsed.themeStyle : defaults.themeStyle,
              accentColor: isHex(parsed.accentColor) ? parsed.accentColor.toLowerCase() : defaults.accentColor,
              uiFont: uiFonts[parsed.uiFont] ? parsed.uiFont : defaults.uiFont,
              codeFont: codeFonts[parsed.codeFont] ? parsed.codeFont : defaults.codeFont,
              contrast: clamp(parsed.contrast),
              translucentSidebar:
                typeof parsed.translucentSidebar === 'boolean'
                  ? parsed.translucentSidebar
                  : defaults.translucentSidebar,
            }
          } else {
            const legacy = localStorage.getItem(legacyKey)
            if (legacy === 'light' || legacy === 'dark') {
              config = { ...defaults, themeMode: legacy }
            }
          }
        } catch {}

        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const resolvedMode = config.themeMode === 'system' ? (prefersDark ? 'dark' : 'light') : config.themeMode
        const styleTokens = themeTokens[config.themeStyle][resolvedMode]
        const accentRgb = parseRgb(config.accentColor)
        const root = document.documentElement
        root.dataset.themeMode = config.themeMode
        root.dataset.themeResolved = resolvedMode
        root.dataset.themeStyle = config.themeStyle
        root.dataset.sidebarTranslucent = config.translucentSidebar ? 'true' : 'false'
        root.style.colorScheme = resolvedMode
        root.style.setProperty('--ui-font-family', uiFonts[config.uiFont])
        root.style.setProperty('--code-font-family', codeFonts[config.codeFont])
        root.style.setProperty('--theme-accent', config.accentColor)
        root.style.setProperty('--theme-accent-soft', rgba(accentRgb, resolvedMode === 'dark' ? 0.22 : 0.14))
        root.style.setProperty('--theme-accent-contrast', accentForeground(config.accentColor))
        root.style.setProperty('--gold', config.accentColor)
        root.style.setProperty('--navy', styleTokens.textMain)
        root.style.setProperty('--bg-main', styleTokens.mainBg)
        root.style.setProperty('--bg-sidebar', styleTokens.sidebarBg)
        root.style.setProperty('--bg-chat', styleTokens.chatBg)
        root.style.setProperty('--text-main', styleTokens.textMain)
        root.style.setProperty('--text-muted', styleTokens.textMuted)
        root.style.setProperty('--text-sidebar', styleTokens.textSidebar)
        root.style.setProperty('--border-color', styleTokens.borderColor)
        root.style.setProperty('--input-bg', styleTokens.inputBg)
        root.style.setProperty('--input-border', styleTokens.inputBorder)
        root.style.setProperty('--sidebar-hover', styleTokens.sidebarHover)
        root.style.setProperty('--sidebar-surface', styleTokens.sidebarSurface)
        root.style.setProperty('--sidebar-surface-muted', styleTokens.sidebarSurfaceMuted)
        root.style.setProperty('--sidebar-muted', styleTokens.sidebarMuted)
        root.style.setProperty('--composer-menu-bg', styleTokens.panelBg)
        root.style.setProperty('--composer-menu-bg-strong', styleTokens.panelBgStrong)
        root.style.setProperty('--scrollbar-thumb', styleTokens.scrollbarThumb)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
