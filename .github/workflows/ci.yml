name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          # Match local dev when using Python 3.14; docs/api/openapi.json must match app.openapi() for this interpreter.
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system -r requirements-ci.txt
      - name: Ruff check
        run: ruff check backend goat_ai scripts tools __tests__
      - name: Ruff format check on changed Python files
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${GITHUB_BASE_REF}"
          else
            # push: GITHUB_EVENT_BEFORE may be unset (set -u) or all-zero for new branches
            before="${GITHUB_EVENT_BEFORE:-}"
            if [[ -n "${before}" && "${before}" != "0000000000000000000000000000000000000000" ]]; then
              base_ref="${before}"
            else
              base_ref="$(git rev-parse HEAD^ 2>/dev/null || true)"
            fi
          fi
          if [[ -z "${base_ref}" ]]; then
            echo "No base ref for diff; skipping ruff format check on changed files."
            exit 0
          fi
          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "${base_ref}" "${GITHUB_SHA}" | grep -E '\.py$' || true)
          if (( ${#changed_files[@]} )); then
            ruff format --check "${changed_files[@]}"
          fi
      - name: Dependency audit
        run: pip-audit -r requirements-ci.txt
      - name: Import layer lint
        run: lint-imports
      - name: RAG eval regression (Phase 14.7)
        run: python -m tools.quality.run_rag_eval
      - name: API Contract Gate
        run: python -m tools.contracts.check_api_contract_sync
      - name: Pytest
        run: python -m pytest __tests__/ -v --tb=short --cov=backend --cov=goat_ai --cov-report=term-missing --cov-fail-under=70
      - name: PR latency gate
        run: |
          python -m tools.quality.run_pr_latency_gate \
            --runs 8 \
            --max-total-p95-ms 1200 \
            --max-first-token-p95-ms 400 \
            --json-output pr-latency-gate-summary.json

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Frontend lint, contract, tests, and build
        working-directory: frontend
        run: npm run lint && npm run contract:check && npm run test:coverage && npm run build && npm run bundle:check && npm run test:e2e

  desktop-supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget
      - name: Install desktop sidecar build dependencies
        run: python -m pip install -r requirements-desktop-build.txt
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Linux desktop sidecar
        run: python -m tools.desktop.build_desktop_sidecar --target-triple x86_64-unknown-linux-gnu --clean
      - name: Desktop Rust tests
        run: cargo test --manifest-path frontend/src-tauri/Cargo.toml
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Rust dependency audit
        run: |
          cargo audit --deny warnings --file frontend/src-tauri/Cargo.lock \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2025-0075 \
            --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 \
            --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100 \
            --ignore RUSTSEC-2026-0097

  desktop-package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop sidecar build dependencies
        run: python -m pip install -r requirements-desktop-build.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build Windows desktop package
        working-directory: frontend
        run: npm run desktop:build
      - name: Write packaged desktop provenance
        shell: pwsh
        run: |
          python -m tools.desktop.write_desktop_release_provenance `
            --bundle-root frontend/src-tauri/target/release/bundle `
            --pattern "msi/*.msi" `
            --pattern "nsis/*-setup.exe" `
            --output desktop-windows-ci-provenance.json `
            --release-ref "${{ github.ref_name }}" `
            --resolved-sha "${{ github.sha }}" `
            --platform windows-x64 `
            --distribution-channel internal_test
      - name: Upload packaged desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-ci-artifacts
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*-setup.exe
            desktop-windows-ci-provenance.json
