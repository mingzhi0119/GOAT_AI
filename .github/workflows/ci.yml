name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          # Match local dev when using Python 3.14; docs/openapi.json must match app.openapi() for this interpreter.
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system -r requirements-ci.txt
      - name: Ruff check
        run: ruff check backend goat_ai scripts tools __tests__
      - name: Ruff format check on changed Python files
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${GITHUB_BASE_REF}"
          else
            # push: GITHUB_EVENT_BEFORE may be unset (set -u) or all-zero for new branches
            before="${GITHUB_EVENT_BEFORE:-}"
            if [[ -n "${before}" && "${before}" != "0000000000000000000000000000000000000000" ]]; then
              base_ref="${before}"
            else
              base_ref="$(git rev-parse HEAD^ 2>/dev/null || true)"
            fi
          fi
          if [[ -z "${base_ref}" ]]; then
            echo "No base ref for diff; skipping ruff format check on changed files."
            exit 0
          fi
          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "${base_ref}" "${GITHUB_SHA}" | grep -E '\.py$' || true)
          if (( ${#changed_files[@]} )); then
            ruff format --check "${changed_files[@]}"
          fi
      - name: Dependency audit
        run: pip-audit -r requirements-ci.txt
      - name: Import layer lint
        run: lint-imports
      - name: RAG eval regression (Phase 14.7)
        run: python -m tools.run_rag_eval
      - name: API Contract Gate
        run: python -m tools.check_api_contract_sync
      - name: Pytest
        run: python -m pytest __tests__/ -v --tb=short --cov=backend --cov=goat_ai --cov-report=term-missing --cov-fail-under=70

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and test
        working-directory: frontend
        run: npm ci && npm run test:coverage && npm run build
