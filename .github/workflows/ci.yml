name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff check
        run: ruff check backend goat_ai scripts tools __tests__
      - name: Ruff format check on changed Python files
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${GITHUB_BASE_REF}"
          else
            base_ref="${GITHUB_EVENT_BEFORE}"
          fi
          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "${base_ref}" "${GITHUB_SHA}" | grep -E '\.py$' || true)
          if (( ${#changed_files[@]} )); then
            ruff format --check "${changed_files[@]}"
          fi
      - name: Dependency audit
        run: pip-audit -r requirements.txt
      - name: Import layer lint
        run: lint-imports
      - name: RAG eval regression (Phase 14.7)
        run: python -m tools.run_rag_eval
      - name: API Contract Gate
        run: python -m tools.check_api_contract_sync
      - name: Pytest
        run: python -m pytest __tests__/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and test
        working-directory: frontend
        run: npm ci && npm test -- --run && npm run build
