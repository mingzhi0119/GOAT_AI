name: Fault Injection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 3"

jobs:
  resilience-drills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Install backend dependencies
        run: uv pip install --system -r requirements-ci.txt
      - name: Run resilience drill suite
        run: |
          python -m pytest \
            __tests__/backend/services/test_ollama_client_cache.py \
            __tests__/desktop/test_desktop_smoke.py \
            __tests__/ops/test_recovery_drill.py \
            __tests__/ops/test_release_rollback_drill.py \
            __tests__/contracts/test_api_blackbox_contract.py \
            -k "interrupted or unavailable or persist or recovery_drill or release_rollback_drill or desktop_smoke" \
            -q

  windows-installed-desktop-drill:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements-desktop-build.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
      - name: Install desktop build dependencies
        run: python -m pip install -r requirements-desktop-build.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build Windows desktop installers
        working-directory: frontend
        run: npm run desktop:build
      - name: Capture Windows installer paths
        id: windows_artifacts
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "frontend/src-tauri/target/release/bundle/msi/*.msi" -File | Select-Object -First 1
          $nsis = Get-ChildItem -Path "frontend/src-tauri/target/release/bundle/nsis/*-setup.exe" -File | Select-Object -First 1
          if ($null -eq $msi -or $null -eq $nsis) {
            throw "Expected both MSI and NSIS desktop installer artifacts."
          }
          "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "nsis_path=$($nsis.FullName)" >> $env:GITHUB_OUTPUT
      - name: Run installed MSI desktop drill
        shell: pwsh
        run: |
          python -m tools.desktop.installed_windows_desktop_fault_smoke `
            --installer "${{ steps.windows_artifacts.outputs.msi_path }}" `
            --installer-kind msi `
            --artifact-dir "desktop-installed-smoke/msi" `
            --workflow-role fault_injection_drill `
            --release-ref "${{ github.ref_name }}" `
            --resolved-sha "${{ github.sha }}" `
            --distribution-channel internal_test
      - name: Run installed NSIS desktop drill
        shell: pwsh
        run: |
          python -m tools.desktop.installed_windows_desktop_fault_smoke `
            --installer "${{ steps.windows_artifacts.outputs.nsis_path }}" `
            --installer-kind nsis `
            --artifact-dir "desktop-installed-smoke/nsis" `
            --workflow-role fault_injection_drill `
            --release-ref "${{ github.ref_name }}" `
            --resolved-sha "${{ github.sha }}" `
            --distribution-channel internal_test
      - name: Summarize installed Windows drill evidence
        if: ${{ always() }}
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "## Installed Windows drill evidence"
          $summaries = Get-ChildItem -Path "desktop-installed-smoke/*/summary.json" -File -ErrorAction SilentlyContinue
          if ($null -eq $summaries -or $summaries.Count -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "No installed Windows summary.json artifact was produced."
            exit 0
          }
          foreach ($summaryPath in $summaries) {
            $payload = Get-Content $summaryPath.FullName -Raw | ConvertFrom-Json
            $healthyLaunch = $payload.healthy_launch
            $readyStatus = if ($null -eq $healthyLaunch) { "<none>" } else { $healthyLaunch.ready_status }
            $healthyStatus = if ($null -eq $healthyLaunch) { "<none>" } else { $healthyLaunch.status }
            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "* $($payload.installer_kind): status=$($payload.status), phase=$($payload.phase), healthy_launch=$healthyStatus, ready_status=$readyStatus, summary=$($summaryPath.FullName)"
      - name: Upload installed Windows drill evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installed-drill
          path: desktop-installed-smoke
