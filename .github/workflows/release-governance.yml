name: Release Governance

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
        type: string
      deploy_staging:
        description: "Deploy to staging"
        required: true
        default: true
        type: boolean
      deploy_production:
        description: "Deploy to production after staging approval"
        required: true
        default: false
        type: boolean

jobs:
  release-manifest:
    runs-on: ubuntu-latest
    outputs:
      resolved_sha: ${{ steps.meta.outputs.resolved_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0
      - name: Generate release manifest
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "resolved_sha=${sha}" >> "${GITHUB_OUTPUT}"
          cat > release-manifest.json <<EOF
          {
            "release_ref": "${{ inputs.release_ref }}",
            "resolved_sha": "${sha}",
            "actor": "${{ github.actor }}",
            "generated_at_utc": "${ts}"
          }
          EOF
      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy-staging:
    if: ${{ inputs.deploy_staging }}
    needs: release-manifest
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install post-deploy checker dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy staging ref
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "cd '${{ secrets.STAGING_APP_DIR }}' && SYNC_GIT=1 GIT_REF='${{ inputs.release_ref }}' EXPECTED_GIT_SHA='${{ needs.release-manifest.outputs.resolved_sha }}' bash deploy.sh"
      - name: Run staging post-deploy check
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
          STAGING_OWNER_ID: ${{ secrets.STAGING_OWNER_ID }}
        run: |
          python scripts/post_deploy_check.py \
            --base-url "${STAGING_BASE_URL}" \
            --api-key "${STAGING_API_KEY}" \
            --owner-id "${STAGING_OWNER_ID}"

  deploy-production:
    if: ${{ inputs.deploy_production }}
    needs:
      - release-manifest
      - deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install post-deploy checker dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PRODUCTION_SSH_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy production ref
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.PRODUCTION_SSH_USER }}@${{ secrets.PRODUCTION_SSH_HOST }}" \
            "cd '${{ secrets.PRODUCTION_APP_DIR }}' && SYNC_GIT=1 GIT_REF='${{ inputs.release_ref }}' EXPECTED_GIT_SHA='${{ needs.release-manifest.outputs.resolved_sha }}' bash deploy.sh"
      - name: Run production post-deploy check
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          PRODUCTION_API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
          PRODUCTION_OWNER_ID: ${{ secrets.PRODUCTION_OWNER_ID }}
        run: |
          python scripts/post_deploy_check.py \
            --base-url "${PRODUCTION_BASE_URL}" \
            --api-key "${PRODUCTION_API_KEY}" \
            --owner-id "${PRODUCTION_OWNER_ID}"
