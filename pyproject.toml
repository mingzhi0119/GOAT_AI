[tool.importlinter]
root_packages = ["backend", "goat_ai"]
include_external_packages = true

[tool.coverage.run]
branch = true
source = ["backend", "goat_ai"]
omit = ["__tests__/*", "backend/migrations/*"]

[tool.coverage.report]
skip_covered = true
show_missing = true
fail_under = 70

# First row = outermost. Sibling layers (same | group) may not import each other.
[[tool.importlinter.contracts]]
name = "Backend layers: HTTP over wiring over app over shared"
type = "layers"
layers = [
    "backend.main",
    "backend.routers",
    "backend.platform.dependencies",
    "backend.platform.exception_handlers",
    "backend.platform.http_security | backend.platform.otel_middleware",
    "backend.application",
    "backend.services",
    "backend.domain",
    "backend.models",
    "backend.api_errors | backend.platform.config | backend.types",
    "goat_ai",
]
